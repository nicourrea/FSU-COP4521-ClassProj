<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Family {{ family_id }} Members</title>
</head>
<body>
    <h1>Members of Family {{ family_id }}</h1>
    <table border="1">
        <tr>
            <th>User ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Created At</th>
            <th>Actions</th>
        </tr>
        {% for member in members %}
            <tr>
                <td>{{ member[0] }}</td>
                <td>{{ member[1] }}</td>
                <td>{{ member[2] }}</td>
                <td>{{ member[3] }}</td>
                <td>
                    
                    <form action="{{ url_for('admin_delete_user', user_id=member[0], family_id=family_id) }}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this user?');">
                        <button type="submit">Delete</button>
                    </form>
                  
                    <form action="{{ url_for('reset_password', user_id=member[0]) }}" method="GET" style="display:inline;">
    			<button type="submit">Reset Password</button>
		    </form>
                </td>
            </tr>
        {% endfor %}
    </table>
    <br>
    <a href="{{ url_for('view_families') }}">Back to Family List</a>
</body>
</html>
